function AnalyticsViz({ data }) {
  const source = USE_MOCK ? MOCK_DATA : data;

  layout                  = source.MachineLayoutTracker.machineLayoutChange;
  machineMoldFirstRunPair = source.MoldMachinePairTracker.machineMoldFirstRunPair;
  moldMachineFirstRunPair = source.MoldMachinePairTracker.moldMachineFirstRunPair;
  DayLevelDataProcessor   = source.DayLevelDataProcessor;
  MonthLevelDataProcessor = source.MonthLevelDataProcessor;
  YearLevelDataProcessor  = source.YearLevelDataProcessor;

  // ============================================================
  // DERIVED DATA
  // ============================================================

  const fmt = (d) => new Date(d).toLocaleDateString("en-US", { month: "short", year: "numeric" }).toUpperCase();

  ([DATE_A, DATE_B] = Object.keys(layout[0]).filter(k => k !== "machineName" && k !== "machineCode"));
  PERIOD_LABEL = `${fmt(DATE_A)} — ${fmt(DATE_B)}`;
  LIVE_DATE = DATE_B;
  activeSlots = new Set(layout.map(r => r[DATE_B]).filter(Boolean));
  TOTAL_SLOTS = activeSlots.size;
  allSlots = Array.from({ length: TOTAL_SLOTS },(_, i) => `NO.${String(i + 1).padStart(2, "0")}`);
  layoutMachines = layout.map(m => ({
    name:      m.machineName,
    code:      m.machineCode,
    posA:      m[DATE_A],
    posB:      m[DATE_B],
    isNew:     m[DATE_A] === null,
    moved:     m[DATE_A] !== null && m[DATE_A] !== m[DATE_B],
    unchanged: m[DATE_A] !== null && m[DATE_A] === m[DATE_B],
  }));

  moldKeys    = Object.keys(machineMoldFirstRunPair[0]);
  machineKeys = Object.keys(moldMachineFirstRunPair[0]);
  moldMachineMatrix = moldMachineFirstRunPair.map(row => machineKeys.map(m => (row[m] !== "NaT" ? row[m] : null)));
  machineRunCounts = machineKeys.map((_, mi) => moldMachineMatrix.reduce((s, row) => s + (row[mi] !== null ? 1 : 0), 0));
  moldRunCounts = moldKeys.map((_, di) => machineMoldFirstRunPair.reduce(
    (s, row) => s + (row[moldKeys[di]] !== "NaT" ? 1 : 0), 0));
  totalPairs = moldMachineMatrix.reduce((s, row) => s + row.filter(v => v !== null).length, 0);

  const [activeApp, setActiveApp] = useState("layout");
  const apps = [
    { id: "layout",     label: "FLOOR OPS",   sub: "Layout · Pairing",    icon: "▣" },
    { id: "production", label: "PRODUCTION",  sub: "Day · Month · Year",  icon: "◈" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#020508", fontFamily: "monospace" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .pill { background: transparent; border: 1px solid #1e3a5f; border-radius: 4px; color: #64748b; padding: 5px 12px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; transition: all 0.15s; }
        .pill.active { background: #1d4ed8; border-color: #2563eb; color: #fff; }
        .pill:hover:not(.active) { border-color: #334155; color: #94a3b8; }
        .mod-btn { background: transparent; border: 1px solid #1e3a5f; border-radius: 6px; color: #475569; padding: 8px 20px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; transition: all 0.2s; }
        .mod-btn.active { background: #0c1a2e; border-color: #2563eb; color: #60a5fa; box-shadow: 0 0 12px #2563eb33; }
        .mod-btn:hover:not(.active) { border-color: #334155; color: #64748b; }
        .type-btn { background: transparent; border: 1px solid; border-radius: 4px; padding: 4px 12px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.08em; transition: all 0.15s; }
        tr:hover td { background: #06111e !important; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation: fadeUp 0.25s ease forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .fade { animation: fadeIn 0.3s ease forwards; }
        @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
        .blink { animation: blink 1.6s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        input::placeholder { color: #374151; }
        button:hover { opacity: 0.85; }
      `}</style>

      {/* ── MASTER NAV ── */}
      <div style={{
        background: "linear-gradient(90deg, #060810 0%, #0a0f18 100%)",
        borderBottom: "1px solid #1e2a3a", padding: "0 28px",
        display: "flex", alignItems: "center", gap: 0,
        height: 48, position: "sticky", top: 0, zIndex: 100, backdropFilter: "blur(8px)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginRight: 32 }}>
          <div style={{ display: "flex", gap: 2, alignItems: "flex-end" }}>
            {["#3b82f6","#a78bfa","#10b981"].map((c,i) => (
              <div key={i} style={{ width: 3, height: 12+i*5, background: c, borderRadius: 2 }} />
            ))}
          </div>
          <span style={{ fontSize: 11, letterSpacing: "0.2em", color: "#475569", fontFamily: "'DM Mono',monospace" }}>
            MFG<span style={{ color: "#3b82f6" }}>·</span>OPS
          </span>
        </div>
        <div style={{ display: "flex", height: "100%", gap: 0 }}>
          {apps.map(app => (
            <button key={app.id} onClick={() => setActiveApp(app.id)} style={{
              background: "transparent", border: "none",
              borderBottom: activeApp === app.id ? "2px solid #3b82f6" : "2px solid transparent",
              borderTop: "2px solid transparent", padding: "0 20px",
              cursor: "pointer", display: "flex", alignItems: "center", gap: 8, transition: "all .15s",
            }}>
              <span style={{ fontSize: 14, color: activeApp === app.id ? "#60a5fa" : "#334155" }}>{app.icon}</span>
              <div style={{ textAlign: "left" }}>
                <div style={{ fontSize: 10, fontFamily: "'DM Mono',monospace", letterSpacing: "0.1em", color: activeApp === app.id ? "#93c5fd" : "#475569", fontWeight: 700 }}>{app.label}</div>
                <div style={{ fontSize: 8, color: "#1e3a5f", letterSpacing: "0.1em" }}>{app.sub}</div>
              </div>
            </button>
          ))}
        </div>
        <div style={{ marginLeft: "auto", fontSize: 9, color: "#1e3a5f", letterSpacing: "0.15em", fontFamily: "'DM Mono',monospace" }}>
          {PERIOD_LABEL}
        </div>
      </div>

      {/* ── APP CONTENT ── */}
      <div key={activeApp} style={{ animation: "fadeIn 0.2s ease forwards" }}>
        {activeApp === "layout"     && <App1 />}
        {activeApp === "production" && <App2 />}
      </div>
    </div>
  );
}

function PendingTab({ allMachinesForPending, totalPendingPOs }) {
  const [expandedMachines, setExpandedMachines] = useState({});
  const toggle = (code) => setExpandedMachines(prev => ({ ...prev, [code]: !prev[code] }));

  const renderPOCells = (p) => (
    <>
      <td style={{ padding: "10px 14px", color: "#fbbf24", fontWeight: 600 }}>{p["PO No."]}</td>
      <td style={{ padding: "10px 14px", color: "#e2e8f0", maxWidth: 220 }}>{p["Item Name"]}</td>
      <td style={{ padding: "10px 14px", color: "#a5f3fc", fontSize: 11 }}>{p["Assigned Mold"]}</td>
      <td style={{ padding: "10px 14px", color: "#f1f5f9", fontWeight: 600, textAlign: "right" }}>{p["PO Quantity"]?.toLocaleString()}</td>
      <td style={{ padding: "10px 14px", whiteSpace: "nowrap" }}>
        {p["ETA (PO Date)"] ? <AnalyticsBadge bg="#1e3a5f" color="#93c5fd">{p["ETA (PO Date)"]}</AnalyticsBadge> : "—"}
      </td>
      <td style={{ padding: "10px 14px", textAlign: "center" }}><AnalyticsBadge bg="#292524" color="#a8a29e">{p["Mold Lead Time"]}d</AnalyticsBadge></td>
      <td style={{ padding: "10px 14px", textAlign: "center" }}>
        <AnalyticsBadge bg={p["Priority in Machine"] === 1 ? "#14532d33" : "#1c1917"} color={p["Priority in Machine"] === 1 ? "#22c55e" : "#78716c"}>
          P{p["Priority in Machine"]}
        </AnalyticsBadge>
      </td>
    </>
  );

  return (
    <div>
      <div style={{ fontSize: 11, color: "#64748b", marginBottom: 16, letterSpacing: "0.1em" }}>
        INITIAL PLAN — {totalPendingPOs} PENDING POs — ALL {allMachinesForPending.length} MACHINES
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: "#1e293b", color: "#64748b", textAlign: "left" }}>
              {PENDING_COL_HEADERS.map(h => (
                <th key={h} style={{ padding: "10px 14px", fontWeight: 600, letterSpacing: "0.06em", fontSize: 11, borderBottom: "1px solid #334155", whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {allMachinesForPending.map(({ machine, plans }, groupIdx) => {
              const validPlans = plans.filter(p => p["PO No."]);
              const p1 = validPlans[0] || null;
              const extraPlans = validPlans.slice(1);
              const hasExtra = extraPlans.length > 0;
              const isExpanded = !!expandedMachines[machine.machineCode];
              const bgMain = groupIdx % 2 === 0 ? "#0f172a" : "#111827";

              const machineCell = (
                <td style={{ padding: "10px 14px", whiteSpace: "nowrap", verticalAlign: "middle" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <StatusDot active={!!machine.itemName_poNo} />
                    <div>
                      <span style={{ fontWeight: 700, color: "#38bdf8" }}>{machine.machineNo}</span>
                      <span style={{ color: "#475569", marginLeft: 6, fontSize: 10 }}>{machine.machineCode}</span>
                    </div>
                  </div>
                </td>
              );

              return (
                <>
                  <tr key={`${machine.machineCode}-p1`} className="po-row"
                    onClick={hasExtra ? () => toggle(machine.machineCode) : undefined}
                    style={{ borderBottom: isExpanded ? "none" : "1px solid #1e293b", background: bgMain, opacity: p1 ? 1 : 0.45, cursor: hasExtra ? "pointer" : "default" }}>
                    {machineCell}
                    {p1 ? renderPOCells(p1) : (
                      <td colSpan={7} style={{ padding: "10px 14px", color: "#334155", fontStyle: "italic", fontSize: 11 }}>— No pending plan assigned —</td>
                    )}
                  </tr>

                  {hasExtra && (
                    <tr key={`${machine.machineCode}-hint`}
                      style={{ borderBottom: isExpanded ? "none" : "1px solid #1e293b", background: bgMain, cursor: "pointer" }}
                      onClick={() => toggle(machine.machineCode)}>
                      <td style={{ padding: "4px 14px 8px" }}>
                        {isExpanded
                          ? <span style={{ fontSize: 10, color: "#64748b", letterSpacing: "0.06em", display: "inline-flex", alignItems: "center", gap: 5, background: "#1e293b", borderRadius: 6, padding: "3px 10px", border: "1px solid #334155", whiteSpace: "nowrap" }}>▲ collapse</span>
                          : <span style={{ fontSize: 10, color: "#38bdf8", letterSpacing: "0.06em", display: "inline-flex", alignItems: "center", gap: 5, background: "#0c2a3e", borderRadius: 6, padding: "3px 10px", border: "1px solid #1e4d6b", whiteSpace: "nowrap" }}>
                              ▼ +{extraPlans.length} more PO{extraPlans.length > 1 ? "s" : ""} (P{extraPlans.map(e => e["Priority in Machine"]).join(", P")})
                            </span>
                        }
                      </td>
                      <td colSpan={7} />
                    </tr>
                  )}

                  {hasExtra && isExpanded && extraPlans.map((ep, ei) => (
                    <tr key={`${machine.machineCode}-ex-${ei}`} className="po-row"
                      style={{ borderBottom: ei === extraPlans.length - 1 ? "1px solid #1e293b" : "1px solid #0f172a", background: "#0a1628" }}>
                      <td style={{ padding: "8px 14px", verticalAlign: "middle" }}>
                        <span style={{ fontSize: 11, color: "#334155" }}>└ {machine.machineNo}</span>
                      </td>
                      {renderPOCells(ep)}
                    </tr>
                  ))}
                </>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function InitialPlanningViz({ data }) {
  const source = USE_MOCK ? MOCK_DATA : data;

  // Derived data — chuyển từ ngoài vào trong, đổi DATA → source
  const producing_pro_plan     = source.ProducingOrderPlanner.producing_pro_plan;
  const producing_mold_plan    = source.ProducingOrderPlanner.producing_mold_plan;
  const producing_plastic_plan = source.ProducingOrderPlanner.producing_plastic_plan;
  const initial_plan           = source.PendingOrderPlanner.initial_plan.map(r => ({
    ...r,
    "ETA (PO Date)": r["ETA (PO Date)"] === "NaT" ? null : r["ETA (PO Date)"],
  }));

  const [tab, setTab] = useState("producing");

  // Merge 3 producing plans theo machineCode
  const machineList = producing_pro_plan.map(m => {
    const mold    = producing_mold_plan.find(x => x.machineCode === m.machineCode);
    const plastic = producing_plastic_plan.find(x => x.machineCode === m.machineCode);
    return { ...m, moldName: mold?.moldName, plastic };
  });

  // Group pending plans theo machine
  const pendingByMachine = {};
  initial_plan.forEach(p => {
    const mc = p["Machine Code"];
    if (!pendingByMachine[mc]) pendingByMachine[mc] = [];
    pendingByMachine[mc].push(p);
  });
  const allMachinesForPending = machineList.map(m => ({
    machine: m,
    plans: pendingByMachine[m.machineCode] || [],
  }));

  const activeMachines  = machineList.filter(m => m.itemName_poNo);
  const idleMachines    = machineList.filter(m => !m.itemName_poNo);
  const totalPendingPOs = initial_plan.filter(p => p["PO No."]).length;

  return (
    <div style={{ minHeight: "100vh", background: "#0f172a", fontFamily: "'IBM Plex Mono', 'Courier New', monospace", color: "#e2e8f0" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .tab-btn { cursor: pointer; border: none; background: none; transition: all 0.2s; }
        .tab-btn:hover { background: #1e293b !important; }
        .machine-card { transition: all 0.2s; cursor: pointer; }
        .machine-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.4) !important; }
        .po-row:hover { background: #162032 !important; }
      `}</style>

      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #0f172a 0%, #1e293b 100%)", borderBottom: "1px solid #334155", padding: "20px 28px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: 11, color: "#64748b", letterSpacing: "0.15em", marginBottom: 4 }}>{DASHBOARD_TITLE.subtitle}</div>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#f1f5f9", letterSpacing: "-0.02em" }}>{DASHBOARD_TITLE.title}</div>
        </div>
        <div style={{ display: "flex", gap: 20 }}>
          {[
            { label: "ACTIVE", value: activeMachines.length, color: "#22c55e" },
            { label: "IDLE",   value: idleMachines.length,   color: "#64748b" },
            { label: "TOTAL",  value: machineList.length,    color: "#f1f5f9" },
          ].map((s, i) => (
            <>
              {i > 0 && <div key={`div-${i}`} style={{ width: 1, background: "#334155" }} />}
              <div key={s.label} style={{ textAlign: "right" }}>
                <div style={{ fontSize: 10, color: "#64748b", marginBottom: 2 }}>{s.label}</div>
                <div style={{ fontSize: 24, fontWeight: 700, color: s.color }}>{s.value}</div>
              </div>
            </>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", borderBottom: "1px solid #334155", background: "#0f172a", padding: "0 28px" }}>
        {TABS.map(t => (
          <button key={t.id} className="tab-btn" onClick={() => setTab(t.id)}
            style={{ padding: "12px 20px", fontSize: 12, fontWeight: 600, color: tab === t.id ? "#38bdf8" : "#64748b", borderBottom: tab === t.id ? "2px solid #38bdf8" : "2px solid transparent", letterSpacing: "0.05em", background: tab === t.id ? "#0f1f2e" : "none" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Tab content */}
      <div style={{ padding: "24px 28px" }}>
        {tab === "producing" && <ProducingTab machineList={machineList} />}
        {tab === "pending"   && <PendingTab allMachinesForPending={allMachinesForPending} totalPendingPOs={totalPendingPOs} />}
      </div>
    </div>
  );
}

                                <Icon d={ICONS.terminal} size={13} className="text-slate-600"/>
                                <span className="mono text-xs text-slate-500 tracking-widest uppercase">Control Panel</span>
                                <div className="flex items-center gap-1.5 ml-auto">
                                    <div className="w-2 h-2 rounded-full bg-slate-700"></div>
                                    <div className="w-2 h-2 rounded-full bg-slate-700"></div>
                                    <div className="w-2 h-2 rounded-full" style={{background:'rgba(56,189,248,0.3)'}}></div>
                                </div>
                            </div>

                            {/* Body */}
                            <div className="flex" style={{minHeight:'560px',background:'rgba(10,14,26,0.97)'}}>

                                {/* Sidebar */}
                                <div className="cp-sidebar w-56 flex-shrink-0 p-3 flex flex-col gap-1">
                                    <div className="mono text-xs text-slate-600 px-2 py-2 uppercase tracking-widest">Workflows</div>
                                    {DEMO_WORKFLOWS.map(wf => (
                                        <button
                                            key={wf.id}
                                            onClick={() => { setSelectedWf(wf); handleReset(); }}
                                            className={`cp-wf-item text-left rounded-lg px-3 py-2.5 w-full ${selectedWf.id === wf.id ? 'selected' : ''}`}
                                        >
                                            <div className="mono text-xs text-slate-300 leading-tight truncate">{wf.label.replace(/_/g,' ').replace('strict','').replace('hybrid','').replace('flexible','').trim()}</div>
                                            <div className="mt-1">{policyBadge[wf.policy]}</div>
                                        </button>
                                    ))}

                                    <div className="mt-auto pt-4 border-t border-slate-800/60">
                                        <div className="mono text-xs text-slate-700 px-2 mb-2">System</div>
                                        <div className="px-2 space-y-1">
                                            <div className="flex justify-between">
                                                <span className="mono text-xs text-slate-600">API</span>
                                                <span className="mono text-xs text-emerald-400">● online</span>
                                            </div>
                                            <div className="flex justify-between">
                                                <span className="mono text-xs text-slate-600">Runs</span>
                                                <span className="mono text-xs text-sky-400">{runCount}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Main area */}
                                <div className="flex-1 p-5 flex flex-col gap-4">
                                    {/* Workflow header */}
                                    <div className="flex items-start justify-between gap-4">
                                        <div>
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <span className="mono text-sm font-medium text-white">{selectedWf.label}</span>
                                                {policyBadge[selectedWf.policy]}
                                            </div>
                                            <p className="text-xs text-slate-500 mt-1">{selectedWf.description}</p>
                                            <div className="flex flex-wrap gap-1.5 mt-2">
                                                {selectedWf.modules.map(m => (
                                                    <span key={m} className={`cp-module-badge ${MODULE_BADGE_CLASS[m] || 'badge-data'}`}>{m}</span>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="flex gap-2 flex-shrink-0">
                                            <button
                                                onClick={handleReset}
                                                disabled={runState === 'running'}
                                                className="mono text-xs px-3 py-1.5 rounded border border-slate-700 text-slate-500 hover:text-slate-300 hover:border-slate-600 transition-all disabled:opacity-30"
                                            >Reset</button>
                                            <button
                                                onClick={handleRun}
                                                disabled={runState === 'running'}
                                                className="cp-run-btn mono text-xs px-4 py-1.5 rounded flex items-center gap-2"
                                            >
                                                {runState === 'running'
                                                    ? <><span className="spin">◌</span> Running...</>
                                                    : <><Icon d={ICONS.play} size={11}/> Run Workflow</>
                                                }
                                            </button>
                                        </div>
                                    </div>

                                    {/* Progress bar */}
                                    {runState !== 'idle' && (
                                        <div>
                                            <div className="flex justify-between mb-1">
                                                <span className="mono text-xs text-slate-600">Progress</span>
                                                <span className="mono text-xs text-slate-500">{progress}%</span>
                                            </div>
                                            <div className="progress-bar-track">
                                                <div className="progress-bar-fill" style={{width:`${progress}%`}}/>
                                            </div>
                                        </div>
                                    )}

                                    {/* Log terminal */}
                                    <div className="flex-1 rounded-lg overflow-hidden" style={{border:'1px solid rgba(56,189,248,0.08)',background:'rgba(5,8,18,0.9)'}}>
                                        <div className="flex items-center gap-2 px-3 py-2 border-b border-slate-800/60">
                                            <Icon d={ICONS.terminal} size={12} className="text-slate-600"/>
                                            <span className="mono text-xs text-slate-600">execution log</span>
                                            {runState === 'running' && <span className="mono text-xs text-amber-400 pulse-slow ml-auto">● running</span>}
                                            {runState === 'done'    && <span className="mono text-xs text-emerald-400 ml-auto">● completed</span>}
                                            {runState === 'idle'    && <span className="mono text-xs text-slate-700 ml-auto">● idle</span>}
                                        </div>
                                        <div className="log-scroll p-3 space-y-0.5">
                                            {logs.length === 0 && runState === 'idle' && (
                                                <div className="mono text-xs text-slate-700 py-6 text-center">
                                                    Select a workflow and press Run →
                                                </div>
                                            )}
                                            {logs.map((log, i) => (
                                                <div key={log.id} className="log-line flex items-start gap-2" style={{animationDelay:`${i*0.03}s`}}>
                                                    <span className={`mono text-xs flex-shrink-0 ${LOG_COLORS[log.level] || 'text-slate-400'}`}>
                                                        {LOG_ICONS[log.level] || '›'}
                                                    </span>
                                                    <span className="mono text-xs text-slate-600 flex-shrink-0">[{log.module}]</span>
                                                    <span className={`mono text-xs ${LOG_COLORS[log.level] || 'text-slate-400'}`}>{log.msg}</span>
                                                </div>
                                            ))}
                                            <div ref={logEndRef}/>
                                        </div>
                                    </div>

                                    {/* Summary + View Results (shown when done) */}
                                    {runState === 'done' && selectedWf.summary && (
                                        <div className="rounded-lg p-3 flex items-center justify-between gap-4" style={{border:'1px solid rgba(52,211,153,0.2)',background:'rgba(52,211,153,0.04)'}}>
                                            <div className="flex gap-4 flex-wrap">
                                                <div>
                                                    <div className="mono text-xs text-slate-600">Records</div>
                                                    <div className="mono text-xs text-white font-medium">{selectedWf.summary.records}</div>
                                                </div>
                                                <div>
                                                    <div className="mono text-xs text-slate-600">Duration</div>
                                                    <div className="mono text-xs text-white font-medium">{selectedWf.summary.duration}</div>
                                                </div>
                                                <div>
                                                    <div className="mono text-xs text-slate-600">Status</div>
                                                    <div className="mono text-xs text-emerald-400 font-medium">✔ {selectedWf.summary.status}</div>
                                                </div>
                                                {selectedWf.summary.warnings > 0 && (
                                                    <div>
                                                        <div className="mono text-xs text-slate-600">Warnings</div>
                                                        <div className="mono text-xs text-amber-400 font-medium">{selectedWf.summary.warnings}</div>
                                                    </div>
                                                )}
                                            </div>
                                            {hasViz && (
                                                <button
                                                    onClick={() => setVizOpen(selectedWf.id)}
                                                    className="mono text-xs px-4 py-2 rounded flex items-center gap-2 flex-shrink-0"
                                                    style={{background:'rgba(99,102,241,0.15)',border:'1px solid rgba(99,102,241,0.4)',color:'#a5b4fc',transition:'all 0.2s'}}
                                                    onMouseEnter={e=>{e.currentTarget.style.background='rgba(99,102,241,0.3)';}}
                                                    onMouseLeave={e=>{e.currentTarget.style.background='rgba(99,102,241,0.15)';}}
                                                >
                                                    <Icon d={ICONS.chart} size={12}/> View Results
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="mt-6 flex items-center justify-between">
                            <span className="mono text-xs text-slate-700">OptiMoldIQ · Manufacturing Intelligence Platform</span>
                            <span className="mono text-xs text-slate-700">v2.1.0 · React {typeof React !== 'undefined' ? React.version : ''}</span>
                        </div>
                    </div>
                </div>
                </>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<DemoControlPanel />);
    </script>
</body>
</html>
