        .mono { font-family: 'IBM Plex Mono', monospace; }
        body { background: #0a0e1a; }

        .grid-bg {
            background-image:

                linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.12);
            backdrop-filter: blur(8px);
        }

        .card-hover {
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .card-hover:hover {
            border-color: rgba(56, 189, 248, 0.35);
            box-shadow: 0 0 24px rgba(56, 189, 248, 0.07);
        }

        .tab-active {
            background: rgba(56, 189, 248, 0.12);
            border-color: rgba(56, 189, 248, 0.4);
            color: #38bdf8;
        }
        .tab-inactive {
            border-color: rgba(255,255,255,0.06);
            color: #64748b;
        }
        .tab-inactive:hover {
            border-color: rgba(56, 189, 248, 0.2);
            color: #94a3b8;
        }

        .status-complete { color: #34d399; }
        .status-progress { color: #fbbf24; }
        .status-planned  { color: #94a3b8; }

        .badge-complete { background: rgba(52, 211, 153, 0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.25); }

        .badge-planned  { background: rgba(148, 163, 184, 0.08); color: #94a3b8; border: 1px solid rgba(148,163,184,0.15); }

            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        .glow-text {
            text-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
        }

        .tag {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #818cf8;
            font-family: 'IBM Plex Mono', monospace;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse-slow { animation: pulse-slow 3s ease-in-out infinite; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0a0e1a; }
        ::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.2); border-radius: 2px; }

        /* ── Demo / Control Panel styles ── */
        .cp-sidebar {
            background: rgba(10, 14, 26, 0.95);
            border-right: 1px solid rgba(56, 189, 248, 0.1);
        }
        .cp-wf-item {
            border: 1px solid rgba(56,189,248,0.08);
            background: rgba(15,23,42,0.6);
            transition: all 0.15s;
            cursor: pointer;
        }
        .cp-wf-item:hover { border-color: rgba(56,189,248,0.3); background: rgba(56,189,248,0.05); }
        .cp-wf-item.selected { border-color: rgba(56,189,248,0.5); background: rgba(56,189,248,0.1); }

        .cp-run-btn {
            background: linear-gradient(135deg, rgba(56,189,248,0.2) 0%, rgba(99,102,241,0.2) 100%);
            border: 1px solid rgba(56,189,248,0.4);
            color: #38bdf8;
            transition: all 0.2s;
        }
        .cp-run-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(56,189,248,0.35) 0%, rgba(99,102,241,0.35) 100%);
            box-shadow: 0 0 20px rgba(56,189,248,0.2);
        }
        .cp-run-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .log-line { animation: logFadeIn 0.3s ease forwards; opacity: 0; }
        @keyframes logFadeIn {
            from { opacity: 0; transform: translateX(-6px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .cp-status-idle    { color: #64748b; }
        .cp-status-running { color: #fbbf24; }
        .cp-status-done    { color: #34d399; }
        .cp-status-error   { color: #f87171; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; display: inline-block; }

        .log-scroll {
            max-height: 320px;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .cp-module-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px; padding: 2px 7px; border-radius: 4px;

        .badge-data    { background: rgba(56,189,248,0.1);  color:#38bdf8;  border:1px solid rgba(56,189,248,0.25); }
        .badge-valid   { background: rgba(52,211,153,0.1);  color:#34d399;  border:1px solid rgba(52,211,153,0.25); }
        .badge-plan    { background: rgba(99,102,241,0.1);  color:#818cf8;  border:1px solid rgba(99,102,241,0.25); }
        .badge-analyze { background: rgba(251,191,36,0.1);  color:#fbbf24;  border:1px solid rgba(251,191,36,0.25); }
        .badge-dash    { background: rgba(248,113,113,0.1); color:#f87171;  border:1px solid rgba(248,113,113,0.25); }

        .browser-bar {
            background: rgba(15,23,42,0.95);
            border-bottom: 1px solid rgba(56,189,248,0.1);
        }

        .progress-bar-track {
            background: rgba(56,189,248,0.1);
            border-radius: 2px;
            overflow: hidden;
            height: 3px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            border-radius: 2px;
            transition: width 0.4s ease;

    </style>
</head>

function progColor(p) {
  if (p === null || p === undefined) return "#2a3245";
  if (p >= 90) return "#10b981";
  if (p >= 60) return "#3b82f6";
  if (p >= 30) return "#f59e0b";
  return "#ef4444";
}
function fmt(n) { return (n || 0).toLocaleString(); }
function fmtNum(n) {
  if (!n && n !== 0) return "—";
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
  if (n >= 1_000)     return (n / 1_000).toFixed(0) + "K";
  return String(n);
}
function fmtDate(s) {
  if (!s) return "—";
  const d = new Date(s);
  if (isNaN(d)) return "—";
  return `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}/${d.getFullYear()}`;
}
function parseD(s) {
  if (!s || s === "—") return null;
  const parts = s.split("-");
  if (parts[0].length === 4) return new Date(+parts[0], +parts[1]-1, +parts[2]);
  return new Date(+parts[2], +parts[0]-1, +parts[1]);
}
function parseConfigDate(s) {
  if (!s) return new Date();
  const parts = s.split("-");
  if (parts[0].length === 4) return new Date(+parts[0], +parts[1]-1, +parts[2]);
  return new Date(+parts[2], +parts[0]-1, +parts[1]);
}
function genDates(startDate, n) {
  const out = []; const dt = new Date(startDate);
  for (let i = 0; i < n; i++) { out.push(new Date(dt)); dt.setDate(dt.getDate()+1); }
  return out;
}

function DetailPanel({ row }) {
  const cfg = STATUS_CFG[row.proStatus] || STATUS_CFG.PENDING;
  const dayEntries   = Object.entries(row.dayQuantityMap   || {});
  const shiftEntries = Object.entries(row.shiftQuantityMap || {});
  const machEntries  = Object.entries(row.machineQuantityMap || {});
  const maxDay   = Math.max(...dayEntries.map(([,v]) => v), 1);
  const maxShift = Math.max(...shiftEntries.map(([,v]) => v), 1);

  const Section = ({ title, children, accent="#3b82f6" }) => (
    <div style={{ marginBottom:10 }}>
      <div style={{ fontSize:8, color:accent, letterSpacing:"0.1em", fontWeight:600, borderBottom:`1px solid ${accent}25`, paddingBottom:3, marginBottom:6, textTransform:"uppercase" }}>{title}</div>
      {children}
    </div>
  );
  const KV = ({ k, v, vc }) => (
    <div style={{ display:"flex", justifyContent:"space-between", gap:8, marginBottom:3 }}>
      <span style={{ fontSize:9, color:"#4a6a8a", whiteSpace:"nowrap" }}>{k}</span>
      <span style={{ fontSize:9, color:vc||"#c9d1e0", fontWeight:500, textAlign:"right" }}>{v||"—"}</span>
    </div>
  );
  const Tag = ({ v, c }) => (
    <span style={{ display:"inline-block", padding:"1px 6px", borderRadius:2, background:`${c||"#3b82f6"}18`, border:`1px solid ${c||"#3b82f6"}30`, color:c||"#3b82f6", fontSize:9, marginRight:4, marginBottom:3 }}>{v}</span>
  );

  return (
    <tr style={{ background:"#080e1a" }}>
      <td colSpan={PO_COLS.length} style={{ padding:0, borderBottom:"2px solid #1e3a5f" }}>
        <div style={{ padding:"12px 14px 12px 36px", display:"grid", gridTemplateColumns:"200px 200px 1fr 1fr", gap:"0 20px", borderLeft:`3px solid ${cfg.color}` }}>
          <div>
            <Section title="Production Info" accent={cfg.color}>
              <KV k="Item Type"    v={row.itemType} />
              <KV k="PO Received"  v={fmtDate(row.poReceivedDate)} />
              <KV k="Total Days"   v={row.totalDay   ? `${row.totalDay} day${row.totalDay>1?"s":""}` : "—"} />
              <KV k="Total Shifts" v={row.totalShift ? `${row.totalShift} shifts` : "—"} />
              <KV k="Total Shots"  v={row.totalMoldShot ? fmt(row.totalMoldShot) : "—"} />
              <KV k="Last Record"  v={fmtDate(row.lastestRecordTime)} />
              <KV k="Last Machine" v={row.lastestMachineNo} />
              <KV k="Last Mold"    v={row.lastestMoldNo} />
            </Section>
            {row.warningNotes && (
              <div style={{ padding:"5px 8px", background:"rgba(239,68,68,0.08)", border:"1px solid #ef444430", borderRadius:3, fontSize:9, color:"#ef4444", lineHeight:1.5 }}>⚠ {row.warningNotes}</div>
            )}
          </div>
          <div>
            <Section title="Mold Setup" accent="#8b5cf6">
              {(row.moldHist||[]).map((m,i) => (
                <div key={m} style={{ marginBottom:5 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:2 }}>
                    <span style={{ fontSize:9, color:"#8b5cf6" }}>{m}</span>
                    <span style={{ fontSize:9, color:"#5a6a8a" }}>cav: {row.moldCavity?.[i]??"—"}</span>
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <span style={{ fontSize:8, color:"#4a5a7a" }}>shots</span>
                    <span style={{ fontSize:9, color:"#c9d1e0", fontWeight:500 }}>{fmt(row.moldShotMap?.[m]??0)}</span>
                  </div>
                </div>
              ))}
            </Section>
            <Section title="Machine Output" accent="#06b6d4">
              {machEntries.length ? machEntries.map(([m,q]) => (
                <div key={m} style={{ marginBottom:4 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:1 }}>
                    <span style={{ fontSize:9, color:"#06b6d4" }}>{m}</span>
                    <span style={{ fontSize:9, color:"#c9d1e0", fontWeight:500 }}>{fmt(q)}</span>
                  </div>
                  <div style={{ height:4, background:"#1a2438", borderRadius:2, overflow:"hidden" }}>
                    <div style={{ width:`${(q/(row.itemQuantity||1))*100}%`, height:"100%", background:"#06b6d4", borderRadius:2 }} />
                  </div>
                </div>
              )) : <div style={{ fontSize:9, color:"#3a4a65" }}>No data yet</div>}
            </Section>
          </div>
          <div>
            <Section title="Daily Output" accent="#f59e0b">
              {dayEntries.length ? dayEntries.map(([date,qty]) => (
                <div key={date} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>
                  <span style={{ fontSize:8, color:"#4a5a7a", width:64, flexShrink:0 }}>{date.slice(5)}</span>

            </Section>
          </div>
          <div>
            <Section title="Shift Breakdown" accent="#ec4899">
              {shiftEntries.length ? shiftEntries.map(([k,qty]) => {
                const [date, ...rest] = k.split("_shift_");
                return (
                  <div key={k} style={{ display:"flex", alignItems:"center", gap:6, marginBottom:3 }}>

                  </div>
                );
              }) : <div style={{ fontSize:9, color:"#3a4a65" }}>No shift data</div>}
            </Section>
            <Section title="Material Components" accent="#10b981">
              {(row.materialComponentMap||[]).map((m,i) => (
                <div key={i} style={{ marginBottom:6 }}>
                  {m.plasticResinCode       && <div style={{ marginBottom:2 }}><Tag v={`Resin: ${m.plasticResinCode}`}             c="#10b981" /></div>}

                </div>
              ))}
            </Section>
          </div>
        </div>
      </td>
    </tr>
  );
}

  const FLAT_DATA = useMemo(() => {
    const rows = [];
    ALL_MACHINES.forEach(m => {
      const jobs = DATA_MAP[m];
      if (jobs && jobs.length > 0) {
        // Sort by startedDate ascending so sequential jobs appear in order
        const sorted = [...jobs].sort((a, b) => new Date(a.startedDate) - new Date(b.startedDate));
        sorted.forEach((job, ji) => {
          rows.push({
            ...job,
            idle: false,
            _machineJobIndex: ji,
            _machineTotalJobs: sorted.length,
            _isFirstJob: ji === 0,
          });
        });
      } else {
        rows.push({
          lastestMachineNo: m, poNo: "—", itemName: "— NO ACTIVE JOB —",
          lastestMoldNo: "—", poETA: "—", progress: null, startedDate: "—",
          actualFinishedDate: "—", itemQuantity: 0, estimatedCapacity: 0,
          totalDay: 0, itemRemain: 0, idle: true,
          _machineJobIndex: 0, _machineTotalJobs: 1, _isFirstJob: true,
        });
      }
    });
    return rows;
  }, []);

  const filtered = useMemo(() => {
    // Filter at machine level: if any job of a machine passes, include all its jobs
    // Strategy: filter then dedupe by machine for counts, but show all sub-rows
    return FLAT_DATA.filter(r => {
      if (!showIdle && r.idle) return false;
      if (machineFilter && r.lastestMachineNo !== machineFilter) return false;
      if (search) {
        const q = search.toLowerCase();
        const match = r.itemName.toLowerCase().includes(q) ||
          r.poNo.toLowerCase().includes(q) ||
          r.lastestMachineNo.toLowerCase().includes(q);
        if (!match) return false;
      }
      if (filter === "complete")   return !r.idle && r.progress >= 95;
      if (filter === "inprogress") return !r.idle && r.progress > 0 && r.progress < 95;
      if (filter === "notstarted") return !r.idle && r.progress === 0;
      if (filter === "overdue")    return !r.idle && r.progress < 90 && r.totalDay > 6;
      if (filter === "idle")       return r.idle;
      return true;
    });
  }, [filter, machineFilter, search, showIdle, FLAT_DATA]);

  // For counts, use FULL_DATA (1 row per machine)
  const activeData = FULL_DATA.filter(r => !r.idle);
  const idleCount  = FULL_DATA.filter(r => r.idle).length;

  const totals = useMemo(() => {
    const active = filtered.filter(r => !r.idle);
    return {
      qty: active.reduce((a, r) => a + r.itemQuantity, 0),
      cap: active.reduce((a, r) => a + r.estimatedCapacity, 0),
      rem: active.reduce((a, r) => a + r.itemRemain, 0),
      avgProg: active.length ? (active.reduce((a, r) => a + r.progress, 0) / active.length).toFixed(1) : 0,
    };
  }, [filtered]);

  const FILTER_BTNS = [
    { k:"all",        label:"All",         count: FULL_DATA.length },
    { k:"inprogress", label:"In Progress",  count: activeData.filter(r => r.progress>0&&r.progress<95).length },
    { k:"complete",   label:"≥95% Done",    count: activeData.filter(r => r.progress>=95).length },
    { k:"notstarted", label:"Not Started",  count: activeData.filter(r => r.progress===0).length },
    { k:"overdue",    label:"Long Run",     count: activeData.filter(r => r.progress<90&&r.totalDay>6).length },
    { k:"idle",       label:"Idle",         count: idleCount },
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", flex:1, overflow:"hidden" }}>
      {/* Sub-toolbar */}
      <div style={{ background:"#101520", borderBottom:"1px solid #1a2438", padding:"5px 14px", display:"flex", alignItems:"center", gap:6, flexShrink:0, flexWrap:"wrap" }}>
        {FILTER_BTNS.map(b => (
          <button key={b.k} onClick={() => { setFilter(b.k); if(b.k==="idle") setShowIdle(true); }}
            style={{ padding:"3px 9px", border:"1px solid", borderRadius:3, cursor:"pointer", fontSize:10, background:filter===b.k?(b.k==="idle"?"#1a2438":"#1d4ed8"):"transparent", borderColor:filter===b.k?(b.k==="idle"?"#4a5a7a":"#3b82f6"):"#2a3245", color:filter===b.k?(b.k==="idle"?"#6a7a9a":"#fff"):"#7a8aaa", fontFamily:"inherit", transition:"all .15s" }}>
            {b.label} <span style={{ opacity:0.6 }}>({b.count})</span>
          </button>
        ))}
        <div style={{ width:1, height:16, background:"#1e2d45", margin:"0 2px" }} />
        <button onClick={() => setShowIdle(!showIdle)}
          style={{ padding:"3px 9px", border:"1px solid", borderRadius:3, cursor:"pointer", fontSize:10, background:showIdle?"rgba(74,90,122,0.15)":"transparent", borderColor:showIdle?"#4a5a7a":"#2a3245", color:showIdle?"#6a7a9a":"#4a5a7a", fontFamily:"inherit" }}>
          {showIdle ? "⊙ Showing Idle" : "⊘ Idle Hidden"}
        </button>
        <div style={{ width:1, height:16, background:"#1e2d45", margin:"0 2px" }} />
        <select value={machineFilter} onChange={e => setMachineFilter(e.target.value)}
          style={{ padding:"3px 6px", background:"#0c1018", border:"1px solid #2a3245", borderRadius:3, color:"#c9d1e0", fontSize:10, fontFamily:"inherit" }}>
          <option value="">All Machines</option>
          {ALL_MACHINES.map(m => <option key={m} value={m}>{m}{DATA_MAP[m] ? "" : " (idle)"}</option>)}
        </select>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search goods / PO..."
          style={{ padding:"3px 8px", background:"#0c1018", border:"1px solid #2a3245", borderRadius:3, color:"#c9d1e0", fontSize:10, fontFamily:"inherit", width:160 }} />
        <div style={{ marginLeft:"auto", display:"flex", gap:4 }}>
          {[["table","Table"],["gantt","Gantt"],["both","Both"]].map(([k,l]) => (
            <button key={k} onClick={() => setSubTab(k)}
              style={{ padding:"3px 9px", border:"1px solid", borderRadius:3, cursor:"pointer", fontSize:10, background:subTab===k?"#0f2d4a":"transparent", borderColor:subTab===k?"#0ea5e9":"#2a3245", color:subTab===k?"#0ea5e9":"#7a8aaa", fontFamily:"inherit" }}>{l}</button>
          ))}
        </div>
      </div>

      {/* Summary bar */}
      <div style={{ background:"#0e1622", borderBottom:"1px solid #1a2438", padding:"4px 14px", display:"flex", gap:24, flexShrink:0 }}>
        {[
          ["Total Qty",       fmt(totals.qty),  "#c9d1e0"],
          ["Total Capacity",  fmt(totals.cap),  "#8b9ab5"],
          ["Total Remaining", fmt(totals.rem),  totals.rem > 500000 ? "#ef4444" : "#f59e0b"],
        ].map(([l,v,c]) => (
          <div key={l} style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ fontSize:9, color:"#4a5a7a", letterSpacing:"0.04em" }}>{l}</span>
            <span style={{ fontSize:11, fontWeight:600, color:c }}>{v}</span>
          </div>
        ))}
        <div style={{ marginLeft:"auto", fontSize:9, color:"#4a5a7a", alignSelf:"center" }}>
          {filtered.filter(r=>!r.idle).length} jobs · {filtered.filter(r=>r.idle).length} idle machines
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
        {(subTab==="table"||subTab==="both") && (
          <div style={{ flex:subTab==="both"?"0 0 640px":1, overflow:"auto", borderRight:subTab==="both"?"2px solid #1a2438":"none" }}>
            <table style={{ borderCollapse:"collapse", width:"100%", fontSize:10.5 }}>
              <thead>
                <tr style={{ background:"#101926", position:"sticky", top:0, zIndex:10 }}>
                  {[["Machine",52],["PO #",88],["Goods Name",190],["Mold",90],["Output",72],["Progress",100],["Start",70],["End",70],["Qty",65],["Cap/Day",65],["W.Days",50],["Remain",65]].map(([h,w]) => (
                    <th key={h} style={{ width:w, padding:"4px 5px", textAlign:"left", color:"#4a5a7a", fontWeight:600, fontSize:9, textTransform:"uppercase", letterSpacing:"0.05em", borderBottom:"2px solid #1a2d45", borderRight:"1px solid #1a2438", whiteSpace:"nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((row, i) => {
                  const pc = progColor(row.progress);
                  const isSel = selectedRow === i;
                  const isSubRow = !row._isFirstJob; // continuation row for same machine
                  const isLastJobOfMachine = row._machineJobIndex === row._machineTotalJobs - 1;

                  return (
                    <tr
                      key={row.lastestMachineNo + row.poNo + i}
                      className={"row-hover" + (isSel ? " row-sel" : "") + (row.idle ? " row-idle" : "")}
                      onClick={() => setSelectedRow(isSel ? null : i)}
                      style={{
                        borderBottom: isLastJobOfMachine
                          ? "2px solid rgba(26,36,56,0.9)"   // thick separator between machines
                          : "1px solid rgba(59,130,246,0.12)", // subtle between jobs of same machine
                        cursor: row.idle ? "default" : "pointer",
                        background: isSel
                          ? "rgba(59,130,246,0.12)"
                          : isSubRow
                          ? "rgba(14,20,36,0.6)"             // slightly darker for sub-rows
                          : "transparent",
                      }}
                    >
                      {/* Machine column: only show on first job row, with rowspan visual via border */}
                      <td style={{
                        padding: "3px 5px",
                        fontWeight: 600,
                        color: row.idle ? "#2a3a55" : isSubRow ? "transparent" : "#3b82f6",
                        borderLeft: isSubRow ? "3px solid rgba(59,130,246,0.25)" : "3px solid transparent",
                        position: "relative",
                      }}>
                        {!isSubRow && row.lastestMachineNo}
                        {/* multi-job badge on first row */}
                        {!isSubRow && row._machineTotalJobs > 1 && (
                          <span style={{
                            display: "inline-block",
                            marginLeft: 3,
                            padding: "0px 4px",
                            borderRadius: 2,
                            background: "rgba(59,130,246,0.18)",
                            border: "1px solid rgba(59,130,246,0.3)",
                            color: "#60a5fa",
                            fontSize: 7.5,
                            fontWeight: 700,
                            verticalAlign: "middle",
                          }}>
                            ×{row._machineTotalJobs}
                          </span>
                        )}
                      </td>
                      <td style={{ padding:"3px 5px", color:row.idle?"#2a3a55":"#4a5a7a", fontSize:9.5 }}>{row.poNo}</td>
                      <td style={{ padding:"3px 5px", color:row.idle?"#2a3a55":"#e8edf5", maxWidth:190, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", fontStyle:row.idle?"italic":"normal" }} title={row.itemName}>{row.itemName}</td>
                      <td style={{ padding:"3px 5px", color:"#6a7a9a", fontSize:9 }}>{row.lastestMoldNo}</td>
                      <td style={{ padding:"3px 5px", color:"#5a6a8a", fontSize:9 }}>{row.poETA}</td>
                      <td style={{ padding:"3px 5px" }}>
                        {row.idle ? (
                          <div style={{ fontSize:8, color:"#2a3a55", letterSpacing:"0.08em", fontStyle:"italic", paddingLeft:2 }}>IDLE</div>
                        ) : (
                          <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                            <div style={{ flex:1, height:9, background:"#1a2438", borderRadius:2, overflow:"hidden", border:"1px solid #2a3245" }}>
                              <div style={{ width:row.progress+"%", height:"100%", background:pc, borderRadius:2 }} />
                            </div>
                            <span style={{ color:pc, fontSize:9, width:32, textAlign:"right" }}>{row.progress}%</span>
                          </div>
                        )}
                      </td>
                      <td style={{ padding:"3px 5px", color:"#7a8aaa", fontSize:9 }}>{row.startedDate}</td>
                      <td style={{ padding:"3px 5px", color: row.actualFinishedDate && row.actualFinishedDate !== "—" ? "#10b981" : "#5a6a8a", fontSize:9 }}>{row.actualFinishedDate || "—"}</td>
                      <td style={{ padding:"3px 5px", textAlign:"right", fontWeight:600, color:row.idle?"#2a3a55":"#c9d1e0" }}>{row.idle?"—":fmt(row.itemQuantity)}</td>
                      <td style={{ padding:"3px 5px", textAlign:"right", color:"#6a7a9a" }}>{row.idle?"—":fmt(row.estimatedCapacity)}</td>
                      <td style={{ padding:"3px 5px", textAlign:"center" }}>
                        {!row.idle && (
                          <span style={{ padding:"1px 5px", borderRadius:2, fontSize:9, fontWeight:600, background:row.totalDay>=8?"rgba(239,68,68,0.15)":row.totalDay>=5?"rgba(245,158,11,0.15)":"rgba(16,185,129,0.12)", color:row.totalDay>=8?"#ef4444":row.totalDay>=5?"#f59e0b":"#10b981" }}>{row.totalDay}</span>
                        )}
                      </td>
                      <td style={{ padding:"3px 5px", textAlign:"right", fontWeight:600, color:row.idle?"#2a3a55":row.itemRemain>50000?"#ef4444":row.itemRemain>10000?"#f59e0b":"#10b981" }}>{row.idle?"—":fmt(row.itemRemain)}</td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{ background:"#101926", position:"sticky", bottom:0, borderTop:"2px solid #1a2d45" }}>
                  <td colSpan={8} style={{ padding:"4px 5px", color:"#4a5a7a", fontSize:9, textAlign:"right", letterSpacing:"0.05em" }}>TOTALS (ACTIVE ONLY)</td>
                  <td style={{ padding:"4px 5px", textAlign:"right", fontWeight:600, color:"#3b82f6" }}>{fmt(totals.qty)}</td>
                  <td style={{ padding:"4px 5px", textAlign:"right", color:"#6a7a9a" }}>{fmt(totals.cap)}</td>
                  <td />
                  <td style={{ padding:"4px 5px", textAlign:"right", fontWeight:600, color:"#f59e0b" }}>{fmt(totals.rem)}</td>
                </tr>
              </tfoot>
            </table>
          </div>
        )}

        {(subTab==="gantt"||subTab==="both") && (
          <div style={{ flex:1, overflow:"auto" }}>
            <div style={{ minWidth:GANTT_DATES.length*COL_W+100 }}>
              <table style={{ borderCollapse:"collapse", width:"100%" }}>
                <thead style={{ position:"sticky", top:0, zIndex:10 }}>
                  <tr style={{ background:"#0c1018" }}>
                    {subTab==="gantt" && <th style={{ width:90, background:"#101926", borderRight:"2px solid #1a2d45", borderBottom:"1px solid #1a2438" }} />}
                    {(() => {
                      let cur=null, span=0, cells=[];
                      GANTT_DATES.forEach((d,i) => {
                        const mon = new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
                        const key = `${mon.getMonth()+1}/${mon.getDate()}`;
                        if (key!==cur) { if(cur) cells.push({key:cur,span}); cur=key; span=1; } else span++;
                        if (i===GANTT_DATES.length-1) cells.push({key:cur,span});
                      });
                      return cells.map(c => (
                        <th key={c.key} colSpan={c.span} style={{ textAlign:"center", padding:"2px 0", fontSize:9, fontWeight:600, color:"#3b82f6", borderRight:"1px solid #1a2438", borderBottom:"1px solid #1a2438", background:"#0c1018", letterSpacing:"0.04em" }}>
                          {c.key}
                        </th>
                      ));
                    })()}
                  </tr>
                  <tr style={{ background:"#101926" }}>
                    {subTab==="gantt" && <th style={{ width:90, padding:"3px 6px", textAlign:"left", fontSize:9, color:"#4a5a7a", fontWeight:600, letterSpacing:"0.05em", borderRight:"2px solid #1a2d45", borderBottom:"2px solid #1a2d45" }}>MACHINE</th>}
                    {GANTT_DATES.map((d,i) => {
                      const isToday = d.toDateString()===TODAY_D.toDateString();
                      const isWE = d.getDay()===0||d.getDay()===6;
                      const days = ["Su","Mo","Tu","We","Th","Fr","Sa"];
                      return (
                        <th key={i} style={{ width:COL_W, padding:"3px 0", textAlign:"center", fontSize:8, color:isToday?"#f59e0b":isWE?"#2a3a55":"#5a6a8a", borderRight:"1px solid #1a2438", borderBottom:`2px solid ${isToday?"#f59e0b":"#1a2d45"}`, background:isToday?"rgba(245,158,11,0.08)":"transparent", whiteSpace:"nowrap" }}>
                          <div>{days[d.getDay()]}</div>
                          <div style={{ fontWeight:600 }}>{d.getDate()}</div>
                        </th>
                      );
                    })}
                  </tr>
                </thead>
                <tbody>
                  {FULL_DATA.map((row, ri) => {
                    const jobs = MACHINE_JOBS_MAP[row.lastestMachineNo] || [];

                    return (
                      <tr key={row.lastestMachineNo + ri} className="row-hover"
                        style={{ borderBottom:"2px solid rgba(26,36,56,0.9)", height: Math.max(28, jobs.length * 22 + 8), opacity: row.idle ? 0.35 : 1 }}>

                        {subTab === "gantt" && (
                          <td style={{ padding:"2px 5px", fontSize:9.5, fontWeight:600, color: row.idle ? "#2a3a55" : "#3b82f6", borderRight:"2px solid #1a2d45", whiteSpace:"nowrap", verticalAlign:"middle" }}>
                            {row.lastestMachineNo}
                            {jobs.length > 1 && (
                              <span style={{ display:"block", fontSize:7.5, color:"#3b82f6", opacity:0.6, marginTop:1 }}>
                                {jobs.length} jobs
                              </span>
                            )}
                          </td>
                        )}

                        {GANTT_DATES.map((d, di) => {
                          const isToday = d.toDateString() === TODAY_D.toDateString();
                          const isWE    = d.getDay() === 0 || d.getDay() === 6;

                          const barsHere = jobs
                            .map((job, ji) => {
                              const start = parseD(job.startedDate);
                              const end   = parseD(job.actualFinishedDate);
                              if (!start || !end) return null;
                              if (d.toDateString() !== start.toDateString()) return null;
                              const diff = Math.round((end - start) / 864e5) + 1;
                              const span = Math.min(Math.max(1, diff), GANTT_DATES.length - di);
                              return { job, ji, span };
                            })
                            .filter(Boolean);

                          return (
                            <td key={di} style={{
                              position: "relative",
                              width: COL_W,
                              background: isToday
                                ? "rgba(245,158,11,0.05)"
                                : isWE
                                ? "repeating-linear-gradient(45deg,rgba(26,36,56,0.3),rgba(26,36,56,0.3) 2px,transparent 2px,transparent 6px)"
                                : row.idle
                                ? "repeating-linear-gradient(135deg,rgba(20,28,44,0.4),rgba(20,28,44,0.4) 2px,transparent 2px,transparent 8px)"
                                : "transparent",
                              borderRight: `1px solid ${isToday ? "rgba(245,158,11,0.3)" : "rgba(26,36,56,0.5)"}`,
                              overflow: "visible",
                            }}>
                              {barsHere.map(({ job, ji, span }) => (
                                <div key={ji} style={{
                                  position: "absolute",
                                  top: jobs.length > 1 ? 3 + ji * 22 : 5,
                                  left: 2,
                                  width: span * COL_W - 4,
                                  height: 18,
                                  borderRadius: 2,
                                  background: GANTT_COLORS[(ri * 3 + ji) % GANTT_COLORS.length],
                                  opacity: 0.85,
                                  zIndex: 2,
                                  cursor: "pointer",
                                  overflow: "hidden",
                                }}
                                  title={`${row.lastestMachineNo}: ${job.itemName}\n${job.startedDate} → ${job.actualFinishedDate}\n${job.progress}%`}
                                >
                                  <div style={{ position:"absolute", top:0, left:0, width: job.progress + "%", height:"100%", background:"rgba(255,255,255,0.18)", borderRadius:2 }} />
                                  {span >= 3 && (
                                    <div style={{ position:"absolute", top:"50%", left:4, transform:"translateY(-50%)", fontSize:7.5, color:"rgba(255,255,255,0.9)", whiteSpace:"nowrap", fontWeight:600 }}>
                                      {job.progress}% · {job.itemName.slice(0, 18)}
                                    </div>
                                  )}
                                </div>
                              ))}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================================
//  PO STATUS BOARD PANEL
// ============================================================
function POStatusPanel() {
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterETA,    setFilterETA]    = useState("all");
  const [search,       setSearch]       = useState("");
  const [sortKey,      setSortKey]      = useState("poNo");
  const [sortAsc,      setSortAsc]      = useState(true);
  const [expanded,     setExpanded]     = useState(new Set());

  const stats = useMemo(() => ({
    total:   PO_JSON.length,
    molding: PO_JSON.filter(r => r.proStatus==="MOLDING").length,
    molded:  PO_JSON.filter(r => r.proStatus==="MOLDED").length,
    paused:  PO_JSON.filter(r => r.proStatus==="PAUSED").length,
    pending: PO_JSON.filter(r => r.proStatus==="PENDING").length,
    late:    PO_JSON.filter(r => r.etaStatus==="LATE").length,
    avgProg: (PO_JSON.reduce((a,r) => a+r.progress, 0)/PO_JSON.length).toFixed(1),
  }), []);

  const filtered = useMemo(() => {
    let d = [...PO_JSON];
    if (filterStatus!=="all") d = d.filter(r => r.proStatus===filterStatus);
    if (filterETA   !=="all") d = d.filter(r => r.etaStatus===filterETA);
    if (search) {
      const q = search.toLowerCase();
      d = d.filter(r => r.poNo.toLowerCase().includes(q)||r.itemName.toLowerCase().includes(q)||r.itemCode.toLowerCase().includes(q)||r.moldList.toLowerCase().includes(q));
    }
    d.sort((a,b) => {
      let av=a[sortKey]??"", bv=b[sortKey]??"";
      if (typeof av==="number") return sortAsc?av-bv:bv-av;
      return sortAsc?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
    });
    return d;
  }, [filterStatus, filterETA, search, sortKey, sortAsc]);

  function doSort(k) { if(sortKey===k) setSortAsc(a=>!a); else { setSortKey(k); setSortAsc(true); } }
  function sortIco(k) {
    if (sortKey!==k) return <span style={{ color:"#293a55", fontSize:8 }}> ⇅</span>;
    return <span style={{ color:"#3b82f6", fontSize:8 }}>{sortAsc?" ↑":" ↓"}</span>;
  }
  function toggleExpand(poNo) {
    setExpanded(prev => { const s=new Set(prev); s.has(poNo)?s.delete(poNo):s.add(poNo); return s; });
  }

  const FBNS = [
    { k:"all",     label:"All",     n:stats.total   },
    { k:"MOLDING", label:"Molding", n:stats.molding },
    { k:"MOLDED",  label:"Molded",  n:stats.molded  },
    { k:"PAUSED",  label:"Paused",  n:stats.paused  },
    { k:"PENDING", label:"Pending", n:stats.pending },
  ];

  return (
    <div style={{ display:"flex", flexDirection:"column", flex:1, overflow:"hidden" }}>
      <div style={{ background:"#0e1622", borderBottom:"1px solid #1a2438", padding:"4px 14px", display:"flex", gap:22, flexShrink:0, alignItems:"center" }}>
        {[
          ["TOTAL",   stats.total,         "#c9d1e0"],
          ["MOLDING", stats.molding,        "#3b82f6"],
          ["PAUSED",  stats.paused,         "#f59e0b"],
          ["MOLDED",  stats.molded,         "#10b981"],
          ["LATE",    stats.late,           "#ef4444"],
          ["AVG",     stats.avgProg+"%",    progColor(+stats.avgProg)],
        ].map(([l,v,c]) => (
          <div key={l} style={{ display:"flex", alignItems:"center", gap:6 }}>
            <span style={{ fontSize:8, color:"#4a5a7a", letterSpacing:"0.06em" }}>{l}</span>
            <span style={{ fontSize:11, fontWeight:600, color:c }}>{v}</span>
          </div>
        ))}
        <div style={{ marginLeft:"auto", fontSize:9, color:"#3a4a65" }}>{filtered.length}/{PO_JSON.length} rows</div>
      </div>

      <div style={{ background:"#101520", borderBottom:"1px solid #1a2438", padding:"5px 14px", display:"flex", alignItems:"center", gap:5, flexShrink:0, flexWrap:"wrap" }}>
        {FBNS.map(b => {
          const cfg = STATUS_CFG[b.k];
          const on  = filterStatus===b.k;
          return (
            <button key={b.k} onClick={() => setFilterStatus(b.k)}

function ProgressTrackingViz({ data }) {
  const source = USE_MOCK ? MOCK_DATA : data;

  DAILY_JSON = source.ProgressTracker.productionStatus.daily_data;
  PO_JSON    = source.ProgressTracker.productionStatus.tracking_data;

  REPORT_DATE = new Date().toLocaleDateString("en-US", {weekday:"short", month:"short", day:"numeric", year:"numeric"});

  TODAY = DAILY_JSON.map(r => r.actualFinishedDate).filter(Boolean).sort().at(-1);
  todayDate  = new Date(TODAY);
  ganttStart = new Date(todayDate.getFullYear(), todayDate.getMonth(), 1);
  GANTT_START = `${ganttStart.getFullYear()}-${String(ganttStart.getMonth()+1).padStart(2,"0")}-01`;
  GANTT_DAYS = new Date(todayDate.getFullYear(), todayDate.getMonth() + 1, 0).getDate();
  GANTT_DATES = genDates(parseConfigDate(GANTT_START), GANTT_DAYS);
  TODAY_D = parseConfigDate(TODAY);

  MACHINE_COUNT = new Set(DAILY_JSON.map(r => r.lastestMachineNo)).size;
  ALL_MACHINES = Array.from({ length: MACHINE_COUNT }, (_, i) => `NO.${String(i + 1).padStart(2, "0")}`);

  // DATA_MAP: machine → array of all jobs
  DATA_MAP = {};
  DAILY_JSON.forEach(r => {
    if (!DATA_MAP[r.lastestMachineNo]) DATA_MAP[r.lastestMachineNo] = [];
    DATA_MAP[r.lastestMachineNo].push(r);
  });

  // FULL_DATA: 1 row per machine (latest job) — used for Gantt row list & stats
  FULL_DATA = ALL_MACHINES.map(m => {
    if (DATA_MAP[m] && DATA_MAP[m].length > 0) {
      const jobs = [...DATA_MAP[m]].sort((a, b) =>
        new Date(b.actualFinishedDate || b.startedDate) - new Date(a.actualFinishedDate || a.startedDate));
      return { ...jobs[0], idle: false };
    }
    return {
      lastestMachineNo: m, poNo: "—", itemName: "— NO ACTIVE JOB —",
      lastestMoldNo: "—", poETA: "—", progress: null, startedDate: "—",
      actualFinishedDate: "—", itemQuantity: 0, estimatedCapacity: 0,
      totalDay: 0, itemRemain: 0, idle: true,
    };
  });

  // MACHINE_JOBS_MAP: machine → sorted jobs with valid start+end for Gantt bars
  MACHINE_JOBS_MAP = {};
  ALL_MACHINES.forEach(m => {
    MACHINE_JOBS_MAP[m] = (DATA_MAP[m] || [])
      .filter(r => r.startedDate && r.actualFinishedDate)
      .sort((a, b) => new Date(a.startedDate) - new Date(b.startedDate));
  });

  const [mainTab, setMainTab] = useState("daily");

  const dailyActive = FULL_DATA.filter(r => !r.idle);
  const dailyIdle   = FULL_DATA.filter(r => r.idle).length;
  const dailyAvgProg = dailyActive.length
    ? (dailyActive.reduce((a, r) => a + r.progress, 0) / dailyActive.length).toFixed(1)
    : 0;

  return (
    <div style={{ fontFamily:"'IBM Plex Mono',monospace", background:"#0c1018", color:"#c9d1e0", height:"100vh", display:"flex", flexDirection:"column", overflow:"hidden", fontSize:11 }}>
      <style>{`

        *{box-sizing:border-box;margin:0;padding:0;}

        .row-idle{opacity:0.45;}
        .row-idle:hover{opacity:0.7!important;}
        .rh:hover{background:rgba(22,34,54,0.95)!important;}
        .rexp{background:rgba(20,32,52,0.6)!important;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        input:focus{outline:1px solid #2a4a7a!important;}
        .exp-btn:hover{background:rgba(59,130,246,0.2)!important;color:#7ac8f8!important;}
        .main-tab-btn{transition:all .2s;}
        .main-tab-btn:hover{background:rgba(59,130,246,0.08)!important;}
      `}</style>

      {/* UNIFIED HEADER */}
      <div style={{ background:"#0d1520", borderBottom:"2px solid #1a2d45", padding:"0 14px", display:"flex", alignItems:"stretch", justifyContent:"space-between", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12, padding:"8px 0" }}>
          <div style={{ width:28, height:28, borderRadius:4, background:"linear-gradient(135deg,#1d4ed8,#7c3aed)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:700, color:"#fff", letterSpacing:"-0.05em", flexShrink:0 }}>IM</div>
          <div>
            <div style={{ fontSize:13, fontWeight:600, color:"#e8edf5", letterSpacing:"0.08em" }}>INJECTION MOLDING DASHBOARD</div>
            <div style={{ fontSize:8, color:"#3a4a65", marginTop:1, letterSpacing:"0.06em" }}>PRODUCTION MONITORING SYSTEM &nbsp;·&nbsp; {REPORT_DATE}</div>
          </div>
        </div>

        <div style={{ display:"flex", alignItems:"stretch", gap:0 }}>
          {[
            ["daily", "DAILY REPORT", `${dailyActive.length}/${ALL_MACHINES.length} active · ${dailyIdle} idle`],
            ["po",    "PO STATUS BOARD", `${PO_JSON.length} orders · ${PO_JSON.filter(r=>r.etaStatus==="LATE").length} late`],
          ].map(([k, label, sub]) => {
            const active = mainTab===k;
            return (

        <div style={{ display:"flex", gap:18, alignItems:"center", padding:"8px 0" }}>
          {mainTab==="daily" ? [

      {mainTab==="daily" ? <DailyReportPanel /> : <POStatusPanel />}
    </div>
  );
}

function Arc({ pct, warn, size = 46, maxRate = 1 }) {
  const ep = Math.min(pct / maxRate, 1);
  const r = 17, cx = size / 2, cy = size / 2;
  const circ = Math.PI * 2 * r * 0.75;
  const filled = circ * ep;
  const color = warn ? C.red : ep >= 1 ? C.green : ep > 0.5 ? C.accent : C.yellow;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth="4"
        strokeDasharray={`${circ} 999`} strokeLinecap="round" transform={`rotate(135 ${cx} ${cy})`} />
      <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="4"
        strokeDasharray={`${filled} 999`} strokeLinecap="round" transform={`rotate(135 ${cx} ${cy})`}
        style={{ transition: "stroke-dasharray .5s ease" }} />
      <text x={cx} y={cy + 4} textAnchor="middle" fill={color} fontSize="9"
        fontWeight="700" fontFamily="'Space Mono',monospace">{Math.round(ep * 100)}%</text>
    </svg>
  );
}

            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>

              const dimmed = activeType && m.name !== activeType;
              return (
                <tr key={i} style={{ borderBottom: "1px solid #0a1929", background: i % 2 === 0 ? "transparent" : "#060e1a", opacity: dimmed ? 0.3 : 1, transition: "opacity 0.2s" }}>

function HeatmapMoldMachine({ hoverCell, setHoverCell }) {
  return (
    <div style={{ overflowX: "auto", overflowY: "auto", maxHeight: "55vh" }}>
      <table style={{ borderCollapse: "collapse", fontSize: 9 }}>
        <thead>
          <tr>
            <th style={{ padding: "4px 10px", textAlign: "left", fontSize: 8, color: "#334155", background: "#060f1c", position: "sticky", top: 0, left: 0, zIndex: 3, borderBottom: "1px solid #1e3a5f", minWidth: 140 }}>MOLD</th>
            {machineKeys.map(m => (
              <th key={m} style={{ padding: "5px 3px", fontSize: 8, color: MACHINE_COLORS[m] || "#64748b", background: "#060f1c", position: "sticky", top: 0, zIndex: 2, borderBottom: "1px solid #1e3a5f", whiteSpace: "nowrap", minWidth: 58, textAlign: "center" }}>{m}</th>
            ))}
            <th style={{ padding: "5px 8px", fontSize: 8, color: "#334155", background: "#060f1c", position: "sticky", top: 0, zIndex: 2, borderBottom: "1px solid #1e3a5f" }}>TOTAL</th>
          </tr>
        </thead>
        <tbody>
          {moldKeys.map((mold, mi) => {
            if (moldRunCounts[mi] === 0) return null;
            return (
              <tr key={mold} style={{ borderBottom: "1px solid #0a1929" }}>
                <td style={{ padding: "4px 10px", color: "#64748b", fontSize: 9, background: "#060f1c", position: "sticky", left: 0, zIndex: 1, whiteSpace: "nowrap", borderRight: "1px solid #1e3a5f" }}>{mold}</td>
                {machineKeys.map((machine, machi) => {
                  const date  = moldMachineMatrix[mi][machi];
                  const color = monthColor(date);
                  const isHov = hoverCell?.mold === mold && hoverCell?.machine === machine;
                  return (
                    <td key={machine}
                      onMouseEnter={() => setHoverCell({ mold, machine, date })}
                      onMouseLeave={() => setHoverCell(null)}
                      style={{ padding: "3px", textAlign: "center", background: isHov ? "#0f2040" : date ? monthBg(date) : "transparent", border: isHov ? `1px solid ${color}` : "1px solid transparent", minWidth: 56 }}>
                      {date ? (
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 1 }}>
                          <div style={{ width: 7, height: 7, borderRadius: "50%", background: color, margin: "0 auto" }} />

                        </div>
                      ) : <span style={{ color: "#1e293b", fontSize: 9 }}>·</span>}

          })}

      </table>
    </div>
  );
}

function HeatmapMachMold({ hoverCell, setHoverCell }) {

              <th key={mold} style={{ padding: "5px 2px", fontSize: 7, color: "#475569", background: "#060f1c", position: "sticky", top: 0, zIndex: 2, borderBottom: "1px solid #1e3a5f", whiteSpace: "nowrap", minWidth: 50, textAlign: "center", writingMode: "vertical-rl", height: 88, verticalAlign: "bottom" }}>{mold}</th>

            <tr key={machine} style={{ borderBottom: "1px solid #0a1929" }}>

              {activeMolds.map(mold => {

                const date  = moldMachineMatrix[mi][machi];

                const isHov = hoverCell?.mold === mold && hoverCell?.machine === machine;
                return (
                  <td key={mold}
                    onMouseEnter={() => setHoverCell({ mold, machine, date })}
                    onMouseLeave={() => setHoverCell(null)}
                    style={{ padding: "3px", textAlign: "center", background: isHov ? "#0f2040" : date ? monthBg(date) : "transparent", border: isHov ? `1px solid ${color}` : "1px solid transparent", minWidth: 48 }}>
                    {date ? (
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 1 }}>
                        <div style={{ width: 6, height: 6, borderRadius: "50%", background: color }} />
                        <span style={{ color, fontSize: 7, fontFamily: "'DM Mono',monospace" }}>{date.slice(5)}</span>

                <span style={{ color: machineRunCounts[machi] > 0 ? MACHINE_COLORS[machine] : "#1e293b", fontWeight: 500 }}>{machineRunCounts[machi]}</span>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>

}

function PairList({ monthFilter }) {
  const rows = useMemo(() => {
    const out = [];
    moldKeys.forEach((mold, mi) => {
      machineKeys.forEach((machine, machi) => {
        const date = moldMachineMatrix[mi][machi];
        if (!date) return;
        if (monthFilter !== "all" && date.slice(5, 7) !== monthFilter) return;
        out.push({ mold, machine, date });
      });
    });
    return out.sort((a, b) => a.date.localeCompare(b.date));
  }, [monthFilter]);

  return (
    <div style={{ overflowY: "auto", maxHeight: "55vh" }}>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
        <thead>
          <tr>{["DATE","MOLD","MACHINE","MONTH"].map(h => (
            <th key={h} style={{ padding: "7px 12px", textAlign: "left", fontSize: 8, color: "#475569", letterSpacing: "0.12em", fontWeight: 500, borderBottom: "1px solid #1e3a5f", background: "#060f1c", whiteSpace: "nowrap" }}>{h}</th>
          ))}</tr>
        </thead>
        <tbody>
          {rows.map((r, i) => {
            const color = monthColor(r.date);
            return (
              <tr key={i} style={{ borderBottom: "1px solid #0a1929", background: i % 2 === 0 ? "transparent" : "#060e1a" }}>
                <td style={{ padding: "7px 12px", color, fontFamily: "'DM Mono',monospace", fontWeight: 500 }}>{r.date}</td>
                <td style={{ padding: "7px 12px", color: "#64748b", fontSize: 10 }}>{r.mold}</td>
                <td style={{ padding: "7px 12px", color: MACHINE_COLORS[r.machine] || "#64748b", fontWeight: 500 }}>{r.machine}</td>
                <td style={{ padding: "7px 12px" }}>
                  <span style={{ fontSize: 8, padding: "2px 8px", borderRadius: 3, background: color + "22", color, border: `1px solid ${color}44`, letterSpacing: "0.08em" }}>{r.date.slice(0, 7)}</span>
                </td>
              </tr>
            );
          })}
          {rows.length === 0 && (
            <tr><td colSpan={4} style={{ textAlign: "center", padding: 40, color: "#334155", letterSpacing: "0.1em" }}>NO DATA</td></tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

// DAY LEVEL
// ============================================================
function DayLevel() {
  const [tab,             setTab]             = useState("machine");
  const [selectedMachine, setSelectedMachine] = useState(null);
  const [shiftFilter,     setShiftFilter]     = useState(0);

  const moldRows = DayLevelDataProcessor.moldBasedRecords;
  const itemRows = DayLevelDataProcessor.itemBasedRecords;
  const machines = [...new Set(moldRows.map(r => r.machineInfo))];

  const totalProd = moldRows.reduce((s, r) => s + r.itemTotalQuantity, 0);
  const totalGood = moldRows.reduce((s, r) => s + r.itemGoodQuantity,  0);
  const totalDef  = moldRows.reduce((s, r) => s + r.defectQuantity,    0);
  const overallRate = totalProd > 0 ? (totalDef / totalProd) * 100 : 0;

  function machineStats(machine) {
    const rows    = moldRows.filter(r => r.machineInfo === machine);
    const filtered = shiftFilter === 0 ? rows : rows.filter(r => r.workingShift === shiftFilter);
    const tot  = filtered.reduce((s, r) => s + r.itemTotalQuantity, 0);
    const good = filtered.reduce((s, r) => s + r.itemGoodQuantity,  0);
    const def  = filtered.reduce((s, r) => s + r.defectQuantity,    0);
    const rate = tot > 0 ? (def / tot) * 100 : 0;
    const isIdle = rows.every(r => r.changeType === "machine_idle");
    return { rows, filtered, tot, good, def, rate, isIdle };
  }

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 18 }}>
        <KpiCardB label="TOTAL PRODUCED" value={totalProd.toLocaleString()} color={C.accent}           sub="pcs" />
        <KpiCardB label="GOOD OUTPUT"    value={totalGood.toLocaleString()} color={C.green}            sub="pcs" />
        <KpiCardB label="DEFECTS"        value={totalDef.toLocaleString()}  color={C.orange}           sub="pcs" />
        <KpiCardB label="DEFECT RATE"    value={overallRate.toFixed(2) + "%"} color={defectColor(overallRate)} sub="overall" />
      </div>
      <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
        <PillB label="MACHINE VIEW" active={tab === "machine"} onClick={() => { setTab("machine"); setSelectedMachine(null); }} />
        <PillB label="ITEM VIEW"    active={tab === "item"}    onClick={() => { setTab("item");    setSelectedMachine(null); }} />
        {tab === "machine" && <>
          <span style={{ width: 1, height: 22, background: C.border, alignSelf: "center" }} />
          {[0,1,2,3].map(s => (
            <PillB key={s} label={s === 0 ? "ALL SHIFTS" : `SHIFT ${s}`} active={shiftFilter === s} onClick={() => setShiftFilter(s)} />
          ))}
        </>}
      </div>

      {tab === "machine" && !selectedMachine && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 10 }}>
          {machines.map(m => {
            const { filtered, tot, good, def, rate, isIdle, rows } = machineStats(m);
            const colorBorder = isIdle ? C.border : rate > 15 ? C.red : rate > 5 ? C.orange : C.border;
            return (
              <div key={m} onClick={() => !isIdle && setSelectedMachine(m)}
                style={{ background: C.panel, border: `1px solid ${colorBorder}`, borderRadius: 8, padding: 16, cursor: isIdle ? "default" : "pointer", opacity: isIdle ? .5 : 1, position: "relative", transition: "border-color .2s" }}>
                {isIdle && <span style={{ position: "absolute", top: 10, right: 10, fontSize: 8, background: C.border, color: C.dim, padding: "2px 7px", borderRadius: 3 }}>IDLE</span>}
                {rows.some(r => r.changeType === "color_change") && <span style={{ position: "absolute", top: 10, right: 10, fontSize: 8, background: "#1e3a5f", color: "#93c5fd", padding: "2px 7px", borderRadius: 3 }}>CLR CHG</span>}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 15, color: "#93c5fd", fontWeight: 700 }}>{m.split(" ")[0]}</div>
                    <div style={{ fontSize: 9, color: C.muted }}>{m.replace(m.split(" ")[0] + " ", "")}</div>
                  </div>
                  <Arc pct={rate} maxRate={30} warn={rate > 20} size={48} />
                </div>
                <div style={{ fontSize: 9, color: C.dim, marginBottom: 10 }}>MOLD: <span style={{ color: C.muted }}>{rows[0]?.moldNo}</span></div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
                  {[["TOTAL",tot.toLocaleString(),C.accent],["GOOD",good.toLocaleString(),C.green],["DEFECT",def.toLocaleString(),def>0?C.orange:C.dim]].map(([l,v,c]) => (
                    <div key={l} style={{ textAlign: "center" }}>
                      <div style={{ fontSize: 15, fontWeight: 700, color: c }}>{v}</div>
                      <div style={{ fontSize: 8, color: C.dim, letterSpacing: ".12em" }}>{l}</div>
                    </div>
                  ))}
                </div>
                <div style={{ height: 3, background: C.border, borderRadius: 2, marginTop: 12, overflow: "hidden" }}>
                  <div style={{ width: `${tot > 0 ? (good/tot)*100 : 0}%`, height: "100%", background: C.green, borderRadius: 2, transition: "width .6s" }} />
                </div>
              </div>
            );
          })}
        </div>
      )}

      {tab === "machine" && selectedMachine && (() => {
        const { tot, good, def, rate } = machineStats(selectedMachine);
        const allRows = moldRows.filter(r => r.machineInfo === selectedMachine);
        return (
          <div>
            <button onClick={() => setSelectedMachine(null)} style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 5, color: C.muted, padding: "5px 12px", cursor: "pointer", fontSize: 11, fontFamily: "'Space Mono',monospace", marginBottom: 14 }}>← BACK</button>
            <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden" }}>
              <div style={{ padding: "16px 20px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 18, color: "#93c5fd", fontWeight: 700 }}>{selectedMachine}</div>
                  <div style={{ fontSize: 9, color: C.muted }}>MOLD: {allRows[0]?.moldNo} · CAVITY: {allRows[0]?.moldCavity ?? "—"}</div>
                </div>
                <Arc pct={rate} maxRate={30} warn={rate > 20} size={52} />
              </div>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
                <thead>
                  <tr style={{ background: "#09111d" }}>
                    {["SHIFT","SHOTS","CAVITY","TOTAL","GOOD","DEFECT","RATE","STATUS"].map(h => (
                      <th key={h} style={{ padding: "8px 14px", textAlign: h==="SHIFT"?"center":"right", fontSize: 8, color: C.dim, letterSpacing: ".14em", borderBottom: `1px solid ${C.border}` }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {allRows.map((r, i) => (
                    <tr key={i} style={{ borderBottom: `1px solid ${C.border}` }}>
                      <td style={{ padding: "10px 14px", textAlign: "center" }}>
                        <div style={{ display: "inline-flex", width: 24, height: 24, borderRadius: "50%", background: C.border, color: "#93c5fd", fontSize: 11, alignItems: "center", justifyContent: "center", fontWeight: 700 }}>{r.workingShift}</div>
                      </td>
                      {[r.moldShot, r.moldCavity??"—", r.itemTotalQuantity.toLocaleString(), r.itemGoodQuantity.toLocaleString()].map((v, j) => (
                        <td key={j} style={{ padding: "10px 14px", textAlign: "right", color: C.muted }}>{v}</td>
                      ))}
                      <td style={{ padding: "10px 14px", textAlign: "right", color: r.defectQuantity>0?C.orange:C.dim }}>{r.defectQuantity.toLocaleString()}</td>
                      <td style={{ padding: "10px 14px", textAlign: "right", color: defectColor(r.defectRate), fontWeight: 700 }}>{r.defectRate.toFixed(2)}%</td>
                      <td style={{ padding: "10px 14px", textAlign: "right" }}>
                        <AnalyticsBadge label={r.changeType==="machine_idle"?"IDLE":r.changeType==="color_change"?"CLR CHG":"RUNNING"}
                          color={r.changeType==="machine_idle"?C.dim:r.changeType==="color_change"?"#60a5fa":C.green} />
                      </td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr style={{ background: "#09111d", borderTop: `1px solid ${C.border}` }}>
                    <td colSpan={3} style={{ padding: "10px 14px", fontSize: 9, color: C.dim }}>TOTAL</td>
                    <td style={{ padding: "10px 14px", textAlign: "right", color: C.accent, fontWeight: 700 }}>{tot.toLocaleString()}</td>
                    <td style={{ padding: "10px 14px", textAlign: "right", color: C.green,  fontWeight: 700 }}>{good.toLocaleString()}</td>
                    <td style={{ padding: "10px 14px", textAlign: "right", color: def>0?C.orange:C.dim, fontWeight: 700 }}>{def.toLocaleString()}</td>
                    <td style={{ padding: "10px 14px", textAlign: "right", color: defectColor(rate), fontWeight: 700 }}>{rate.toFixed(2)}%</td>
                    <td />
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        );
      })()}

      {tab === "item" && (
        <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden" }}>
          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
              <thead>
                <tr style={{ background: "#09111d" }}>
                  {["ITEM CODE","DESCRIPTION","TOTAL","GOOD","DEFECT","DEFECT RATE","SHOTS","CAVITY","SHIFTS"].map(h => (
                    <th key={h} style={{ padding: "9px 14px", textAlign: h==="ITEM CODE"||h==="DESCRIPTION"?"left":"right", fontSize: 8, color: C.dim, letterSpacing: ".14em", borderBottom: `1px solid ${C.border}` }}>{h}</th>
                  ))}

              </thead>
              <tbody>
                {itemRows.map((r, i) => {
                  const [code, ...rest] = r.itemInfo.split(" ");

                    <tr key={i} style={{ borderBottom: `1px solid ${C.border}`, background: i%2?`#09111d`:"transparent" }}>

                      <td style={{ padding: "9px 14px", textAlign: "right", color: C.green }}>{r.itemGoodQuantity.toLocaleString()}</td>
                      <td style={{ padding: "9px 14px", textAlign: "right", color: r.defectQuantity>0?C.orange:C.dim }}>{r.defectQuantity.toLocaleString()}</td>
                      <td style={{ padding: "9px 14px", textAlign: "right" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "flex-end" }}>

                          </div>

                        </div>
                      </td>
                      <td style={{ padding: "9px 14px", textAlign: "right", color: C.muted }}>{r.moldTotalShots.toLocaleString()}</td>
                      <td style={{ padding: "9px 14px", textAlign: "right", color: C.muted }}>{r.avgCavity??"—"}</td>
                      <td style={{ padding: "9px 14px", textAlign: "right" }}>

                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function MonthLevel() {
  const [statusF,  setStatusF]  = useState("all");
  const [etaF,     setEtaF]     = useState("all");
  const [search,   setSearch]   = useState("");
  const [sortK,    setSortK]    = useState("poNo");
  const [sortD,    setSortD]    = useState("asc");
  const [selected, setSelected] = useState(null);

  const allRecs = useMemo(() => [
    ...MonthLevelDataProcessor.finishedRecords.map(r  => ({ ...r, category: "finished",   completionProgress: 1.0 })),
    ...MonthLevelDataProcessor.unfinishedRecords.map(r => ({ ...r, category: "unfinished" })),
  ], []);

  const stats = useMemo(() => {
    const fin  = MonthLevelDataProcessor.finishedRecords.length;
    const inP  = MonthLevelDataProcessor.unfinishedRecords.filter(r => r.poStatus === "in_progress").length;
    const ns   = MonthLevelDataProcessor.unfinishedRecords.filter(r => r.poStatus === "not_started").length;
    const crit = MonthLevelDataProcessor.unfinishedRecords.filter(r => r.capacitySeverity === "critical").length;
    const od   = MonthLevelDataProcessor.unfinishedRecords.filter(r => r.is_overdue).length;
    const totalQty = allRecs.reduce((s, r) => s + (r.itemQuantity || 0), 0);
    return { fin, inP, ns, crit, od, totalQty };
  }, [allRecs]);

  const filtered = useMemo(() => {
    let d = allRecs;
    if (statusF !== "all") d = d.filter(r => r.poStatus === statusF);
    if (etaF    !== "all") d = d.filter(r => r.etaStatus === etaF);
    if (search) { const q = search.toLowerCase(); d = d.filter(r => r.poNo?.toLowerCase().includes(q) || r.itemName?.toLowerCase().includes(q) || r.itemCode?.toLowerCase().includes(q)); }
    return [...d].sort((a, b) => {
      let av = a[sortK] ?? "", bv = b[sortK] ?? "";
      if (typeof av === "string") av = av.toLowerCase();
      if (typeof bv === "string") bv = bv.toLowerCase();
      return sortD === "asc" ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
  }, [allRecs, statusF, etaF, search, sortK, sortD]);

  const TS = ({ k, label }) => (
    <th onClick={() => { if (sortK === k) setSortD(d => d === "asc" ? "desc" : "asc"); else { setSortK(k); setSortD("asc"); } }}
      style={{ padding: "8px 12px", textAlign: "left", fontSize: 8, color: sortK === k ? "#93c5fd" : C.dim, letterSpacing: ".15em", borderBottom: `1px solid ${C.border}`, background: "#09111d", cursor: "pointer", userSelect: "none", whiteSpace: "nowrap" }}>
      {label}{sortK === k ? (sortD === "asc" ? " ▲" : " ▼") : <span style={{ color: C.border }}> ⬦</span>}
    </th>
  );

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(6,1fr)", gap: 10, marginBottom: 18 }}>
        <KpiCardB label="FINISHED"    value={stats.fin}  color={C.green}  sub="completed" />
        <KpiCardB label="IN PROGRESS" value={stats.inP}  color={C.accent} sub="active" />
        <KpiCardB label="NOT STARTED" value={stats.ns}   color={C.yellow} sub="pending" />
        <KpiCardB label="CRITICAL"    value={stats.crit} color={C.orange} sub="over capacity" />
        <KpiCardB label="OVERDUE"     value={stats.od}   color={C.red}    sub="past ETA" />
        <KpiCardB label="TOTAL QTY"   value={(stats.totalQty/1000).toFixed(0)+"K"} color="#a78bfa" sub="units" />
      </div>
      <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 8, padding: "11px 14px", marginBottom: 14, display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
        <input placeholder="SEARCH PO / CODE / NAME..." value={search} onChange={e => setSearch(e.target.value)}
          style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 5, padding: "5px 12px", fontSize: 10, color: C.text, outline: "none", fontFamily: "'Space Mono',monospace", minWidth: 220 }} />
        <div style={{ width: 1, height: 20, background: C.border }} />
        {[["all","ALL"],["finished","FINISHED"],["in_progress","IN PROG"],["not_started","NOT STARTED"]].map(([v,l]) => (
          <PillB key={v} label={l} active={statusF === v} onClick={() => setStatusF(v)} />
        ))}
        <div style={{ width: 1, height: 20, background: C.border }} />
        {[["all","ALL ETA"],["ontime","ON TIME"],["late","LATE"],["expected_ontime","EXPECTED"]].map(([v,l]) => (
          <PillB key={v} label={l} active={etaF === v} onClick={() => setEtaF(v)} danger={v==="late"} />
        ))}
        <span style={{ marginLeft: "auto", fontSize: 9, color: C.dim }}>{filtered.length} RECORDS</span>
      </div>
      <div style={{ background: C.panel, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 11 }}>
            <thead>
              <tr>
                <TS k="poNo" label="PO NO" /><TS k="itemCode" label="CODE" /><TS k="itemName" label="ITEM NAME" />
                <TS k="poETA" label="ETA" /><TS k="poStatus" label="STATUS" /><TS k="etaStatus" label="ETA STATUS" />
                <TS k="itemQuantity" label="ORDER QTY" /><TS k="itemGoodQuantity" label="GOOD QTY" />
                <TS k="itemRemainQuantity" label="REMAIN" />
                <th style={{ padding: "8px 12px", fontSize: 8, color: C.dim, letterSpacing: ".15em", borderBottom: `1px solid ${C.border}`, background: "#09111d", textAlign: "center" }}>PROGRESS</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((r, i) => (
                <tr key={r.poNo+i} onClick={() => setSelected(selected?.poNo === r.poNo ? null : r)}
                  style={{ borderBottom: `1px solid ${C.border}`, background: i%2?"#09111d":"transparent", cursor: "pointer" }}>
                  <td style={{ padding: "9px 12px", fontWeight: 700, color: "#93c5fd", whiteSpace: "nowrap" }}>
                    {r.is_backlog && <span style={{ color: C.yellow, marginRight: 4 }}>★</span>}{r.poNo}
                  </td>
                  <td style={{ padding: "9px 12px", color: C.dim, fontSize: 10 }}>{r.itemCode}</td>
                  <td style={{ padding: "9px 12px", color: C.muted, maxWidth: 180, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.itemName}</td>
                  <td style={{ padding: "9px 12px", color: C.dim, fontSize: 10, whiteSpace: "nowrap" }}>{r.poETA}</td>
                  <td style={{ padding: "9px 12px" }}><AnalyticsBadge label={r.poStatus?.replace("_"," ").toUpperCase()} color={statusColor(r.poStatus)} /></td>
                  <td style={{ padding: "9px 12px" }}><AnalyticsBadge label={r.etaStatus==="expected_ontime"?"EXP ON-TIME":r.etaStatus?.toUpperCase()} color={etaColor(r.etaStatus)} /></td>
                  <td style={{ padding: "9px 12px", textAlign: "right", color: C.accent }}>{(r.itemQuantity||0).toLocaleString()}</td>
                  <td style={{ padding: "9px 12px", textAlign: "right", color: C.green }}>{r.itemGoodQuantity!=null?r.itemGoodQuantity.toLocaleString():"—"}</td>
                  <td style={{ padding: "9px 12px", textAlign: "right", color: (r.itemRemainQuantity||0)>0?C.yellow:C.dim }}>{(r.itemRemainQuantity||0).toLocaleString()}</td>
                  <td style={{ padding: "6px 12px", textAlign: "center" }}><Arc pct={r.completionProgress||0} warn={r.capacityWarning} size={42} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {selected && (
        <div style={{ marginTop: 14, background: C.panel, border: `1px solid ${selected.is_overdue?C.red+"55":C.border}`, borderRadius: 8, padding: "20px 22px", borderTop: `3px solid ${selected.is_overdue?C.red:selected.poStatus==="finished"?C.green:C.accent}` }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
            <div>
              <div style={{ fontFamily: "'Space Mono',monospace", fontSize: 20, color: "#93c5fd", fontWeight: 700 }}>{selected.poNo}</div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 3 }}>{selected.itemName} <span style={{ color: C.dim }}>({selected.itemCode})</span></div>
            </div>
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <Arc pct={selected.completionProgress||0} warn={selected.capacityWarning} size={56} />
              <button onClick={() => setSelected(null)} style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 5, color: C.muted, padding: "5px 12px", cursor: "pointer", fontSize: 11, fontFamily: "'Space Mono',monospace" }}>✕ CLOSE</button>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(148px,1fr))", gap: 8 }}>
            {[["PO RECEIVED",selected.poReceivedDate],["ETA DATE",selected.poETA],["FIRST RECORD",selected.firstRecord||"NOT STARTED"],["LAST RECORD",selected.lastRecord||"—"],["ORDER QTY",(selected.itemQuantity||0).toLocaleString()],["GOOD QTY",selected.itemGoodQuantity!=null?selected.itemGoodQuantity.toLocaleString():"—"],["NG QTY",selected.itemNGQuantity!=null?selected.itemNGQuantity.toLocaleString():"—"],["REMAIN QTY",(selected.itemRemainQuantity||0).toLocaleString()],["MOLD",selected.moldHist||"—"],["CAPACITY",selected.capacitySeverity?.toUpperCase()||"—"],["EST. LEAD TIME",selected.totalEstimatedLeadtime!=null?selected.totalEstimatedLeadtime.toFixed(2)+"d":"—"],["BACKLOG",selected.is_backlog?"YES ★":"NO"]].map(([l,v]) => (
              <div key={l} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "10px 12px" }}>
                <div style={{ fontSize: 8, color: C.dim, letterSpacing: ".14em", marginBottom: 4 }}>{l}</div>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.muted }}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function YearLevel() {
  const [view,     setView]     = useState("table");
  const [statusF,  setStatusF]  = useState("all");
  const [etaF,     setEtaF]     = useState("all");
  const [search,   setSearch]   = useState("");
  const [sortK,    setSortK]    = useState("poNo");
  const [sortD,    setSortD]    = useState("asc");
  const [selected, setSelected] = useState(null);

  const allRecs = useMemo(() => [
    ...YearLevelDataProcessor.finishedRecords.map(r  => ({ ...r, category: "finished",   completionProgress: 1.0 })),
    ...YearLevelDataProcessor.unfinishedRecords.map(r => ({ ...r, category: "unfinished" })),
  ], []);

  function calcNgRate(r) {
    const tot = (r.itemGoodQuantity || 0) + (r.itemNGQuantity || 0);
    if (!r.itemNGQuantity || tot === 0) return 0;
    return (r.itemNGQuantity / tot) * 100;
  }

  const stats = useMemo(() => {
    const fin  = YearLevelDataProcessor.finishedRecords.length;
    const inP  = YearLevelDataProcessor.unfinishedRecords.filter(r => r.poStatus === "in_progress").length;
    const ns   = YearLevelDataProcessor.unfinishedRecords.filter(r => r.poStatus === "not_started").length;
    const crit = YearLevelDataProcessor.unfinishedRecords.filter(r => r.capacitySeverity === "critical").length;
    const od   = YearLevelDataProcessor.unfinishedRecords.filter(r => r.is_overdue).length;
    const totalQty  = allRecs.reduce((s, r) => s + (r.itemQuantity || 0), 0);
    const totalNG   = YearLevelDataProcessor.finishedRecords.reduce((s, r) => s + (r.itemNGQuantity || 0), 0);
    const totalGood = YearLevelDataProcessor.finishedRecords.reduce((s, r) => s + (r.itemGoodQuantity || 0), 0);
    const avgNGRate = totalGood + totalNG > 0 ? (totalNG / (totalGood + totalNG)) * 100 : 0;
    return { fin, inP, ns, crit, od, totalQty, avgNGRate };
  }, [allRecs]);

  const filtered = useMemo(() => {
    let d = allRecs;
    if (statusF !== "all") d = d.filter(r => r.poStatus === statusF);
    if (etaF    !== "all") d = d.filter(r => r.etaStatus === etaF);
    if (search) { const q = search.toLowerCase(); d = d.filter(r => r.poNo?.toLowerCase().includes(q) || r.itemName?.toLowerCase().includes(q) || r.itemCode?.toLowerCase().includes(q)); }
    return [...d].sort((a, b) => {
      let av = a[sortK] ?? "", bv = b[sortK] ?? "";
      if (typeof av === "string") av = av.toLowerCase();
      if (typeof bv === "string") bv = bv.toLowerCase();
      return sortD === "asc" ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
  }, [allRecs, statusF, etaF, search, sortK, sortD]);

  const ngChart = useMemo(() => {
    return [...YearLevelDataProcessor.finishedRecords]
      .filter(r => r.itemNGQuantity > 0)
      .map(r => ({ ...r, ngRate: calcNgRate(r) }))
      .sort((a, b) => b.ngRate - a.ngRate)
      .slice(0, 12);
  }, []);
  const maxNG = Math.max(...ngChart.map(d => d.itemNGQuantity));

  const TS = ({ k, label }) => (
    <th onClick={() => { if (sortK === k) setSortD(d => d === "asc" ? "desc" : "asc"); else { setSortK(k); setSortD("asc"); } }}
